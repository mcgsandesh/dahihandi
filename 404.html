<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Maharashtracha Govinda</title>
    <script type="text/javascript">
      // 🎯 गिटहब सब-फोल्डर आणि तुमच्या App.jsx च्या रचनेसाठी परफेक्ट मॅच
      var l = window.location;
      var repoName = 'dahihandi'; 
      var repoPath = '/' + repoName;
      
      // युझरने उघडलेल्या लिंकमधून राऊट पाथ वेगळा करणे
      var routePath = l.pathname.slice(repoPath.length);
      
      // रिडायरेक्ट करताना '/dahihandi/' च्या आतच index.html कडे पाथ सुरक्षित पाठवणे
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repoPath + '/?p=' + routePath.replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
