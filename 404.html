<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Maharashtracha Govinda</title>
    <script type="text/javascript">
      // 🎯 गिटहब सब-फोल्डर '/dahihandi' साठी कडक आणि अधिकृत फिक्स
      var l = window.location;
      var repoName = "dahihandi";

      // मूळ राऊट आणि क्वेरी पॅरामीटर्स गोळा करणे
      var pathAndQuery = l.pathname.slice(repoName.length + 2) + l.search + l.hash;

      // मूळ डोमेनवर रिडायरेक्ट करणे जिथे index.html आहे
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + repoName + '/?p=' + encodeURIComponent(pathAndQuery)
      );
    </script>
  </head>
  <body>
  </body>
</html>
