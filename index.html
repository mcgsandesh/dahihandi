<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maharashtracha Govinda</title>

    <!-- 🎯 कडक बदल: गिटहब पेजेसवर डायरेक्ट लिंक उघडण्यासाठी आणि रिफ्रेश फिक्स करण्यासाठी पॅच -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === 'p') {
          var pairs = l.search.slice(1).split('&');
          var r = pairs[0].split('=')[1].replace(/~and~/g, '&');
          if (r.slice(-1) === '/') r = r.slice(0, -1);
          if (r !== '') {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (r.startsWith('/') ? r : '/' + r) +
              (pairs[1] ? '?' + pairs.slice(1).join('&').replace(/~and~/g, '&') : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
