<script type="text/javascript">
      (function(l) {
        if (l.search[1] === 'p') {
          var pairs = l.search.slice(1).split('&');
          var r = pairs[0].split('=')[1].replace(/~and~/g, '&');
          if (r.slice(-1) === '/') r = r.slice(0, -1);
          if (r !== '') {
            // 🔥 सर्वात महत्वाचं: हा कोड pathname मध्ये पुन्हा '/dahihandi/parle-sports-club/register' सेट करेल
            // ज्यामुळे App.jsx मधील .includes('/register') चा चेक १००% गॅरंटीने ट्रिगर होईल!
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (r.startsWith('/') ? r : '/' + r) +
              (pairs[1] ? '?' + pairs.slice(1).join('&').replace(/~and~/g, '&') : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
