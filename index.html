    <title>Maharashtracha Govinda</title>

    <script type="text/javascript">
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            // डिकोड करून मूळ राऊट परत मिळवणे
            var decodedPath = decodeURIComponent(q.p);
            // क्वेरी पॅरामीटर्स वेगळे करणे जर असतील तर
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (decodedPath.startsWith('/') ? decodedPath : '/' + decodedPath)
            );
          }
        }
      }(window.location));
    </script>
